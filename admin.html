<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>온더브라이드 · 관리자</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- Login -->
  <section class="login-wrap" id="loginView">
    <form class="login-card" id="loginForm">
      <img src="assets/logo-black.png" alt="온더브라이드" class="login-logo" />
      <p class="login-sub">관리자 로그인</p>
      <div class="field"><label>이메일</label><input type="email" id="email" autocomplete="username" required /></div>
      <div class="field"><label>비밀번호</label><input type="password" id="password" autocomplete="current-password" required /></div>
      <button type="submit" class="btn-primary full" id="loginBtn">로그인</button>
      <p class="login-msg" id="loginMsg"></p>
    </form>
  </section>

  <!-- Dashboard -->
  <section class="dash" id="dashView" hidden>
    <header class="dash-head">
      <span class="dash-brand"><img src="assets/logo-black.png" alt="온더브라이드" class="dash-logo" /> <em>관리자</em></span>
      <div class="dash-head-right">
        <span class="dash-user" id="dashUser"></span>
        <button class="btn-ghost" id="refreshBtn">새로고침</button>
        <button class="btn-ghost" id="logoutBtn">로그아웃</button>
      </div>
    </header>

    <div class="dash-body">
      <div class="dash-tabs">
        <button class="dtab active" data-tab="dashboard">대시보드</button>
        <button class="dtab" data-tab="bookings">예약</button>
        <button class="dtab" data-tab="staff">작가관리</button>
        <button class="dtab" data-tab="gallery">갤러리</button>
      </div>

      <div id="tab-dashboard">
        <div class="dash-cards">
          <div class="dash-card" id="card-new">
            <div class="dash-card-head"><h3>🔔 신규 예약</h3><span class="dash-count" id="dcNew">0</span></div>
            <div class="dash-list" id="listNew"></div>
          </div>

          <div class="dash-card" id="card-upcoming">
            <div class="dash-card-head"><h3>📅 다가오는 예식 <small>(2주)</small></h3><span class="dash-count" id="dcUpcoming">0</span></div>
            <div class="dash-list" id="listUpcoming"></div>
          </div>

          <div class="dash-card" id="card-unpaid">
            <div class="dash-card-head"><h3>💳 미입금</h3><span class="dash-count" id="dcUnpaid">0</span></div>
            <div class="dash-list" id="listUnpaid"></div>
          </div>

          <div class="dash-card" id="card-download">
            <div class="dash-card-head"><h3>⬇️ 다운로드 링크 필요</h3><span class="dash-count" id="dcDownload">0</span></div>
            <div class="dash-list" id="listDownload"></div>
          </div>
        </div>

        <div class="dash-card cal-card">
          <div class="dash-card-head">
            <h3>📆 예식 캘린더</h3>
            <div class="cal-nav">
              <button class="btn-ghost" id="calPrev">‹</button>
              <span id="calLabel"></span>
              <button class="btn-ghost" id="calNext">›</button>
            </div>
          </div>
          <div class="calendar" id="calendar"></div>
        </div>

        <div class="dash-card sched-card">
          <div class="dash-card-head sched-head">
            <button class="sched-toggle" id="schedToggle" aria-expanded="false">🗂 월별 일정 · 담당자 배정 <span class="sv-caret">▾</span></button>
          </div>
          <div id="schedBody" hidden>
            <div class="sched-tags" id="schedTags"></div>
            <div class="sched-bar">
              <label class="sched-all"><input type="checkbox" id="schedAll" /> 전체선택</label>
              <select id="schedAssignee"><option value="">담당자 선택…</option></select>
              <button class="btn-sm dl-save" id="schedAssign">선택 배정</button>
              <button class="btn-sm" id="schedShare">선택 공유(복사)</button>
              <span class="sched-selcount" id="schedSelCount"></span>
            </div>
            <div id="schedList"></div>
          </div>
        </div>
      </div>

      <div id="tab-staff" hidden>
        <div class="staff-add">
          <h3>작가 등록</h3>
          <div class="staff-add-row">
            <input type="text" id="stName" placeholder="이름" />
            <input type="text" id="stPhone" class="phone" placeholder="연락처" />
            <button class="btn-primary" id="stAddBtn">추가</button>
          </div>
          <p class="staff-msg" id="stMsg"></p>
        </div>
        <div class="staff-list" id="staffList"></div>
        <p class="empty" id="staffEmpty" hidden>등록된 작가가 없습니다.</p>
      </div>

      <div id="tab-bookings" hidden>
        <div class="filters" id="filters">
          <button class="filter active" data-f="전체">전체 <span id="c_all">0</span></button>
          <button class="filter" data-f="신규">신규 <span id="c_new">0</span></button>
          <button class="filter" data-f="확정">확정 <span id="c_confirm">0</span></button>
          <button class="filter" data-f="취소">취소 <span id="c_cancel">0</span></button>
        </div>

        <div class="bk-search">
          <input type="text" id="bkSearch" placeholder="🔍 이름 · 예식장 · 연락처 검색" autocomplete="off" />
        </div>

        <div class="table-wrap">
          <table class="bk-table">
            <thead>
              <tr>
                <th>접수일</th><th>계약자</th><th>예식일</th><th>예식장</th><th>작가</th><th>금액</th><th>상태</th>
              </tr>
            </thead>
            <tbody id="bkRows"></tbody>
          </table>
          <p class="empty" id="emptyMsg" hidden>예약이 없습니다.</p>
        </div>
      </div>

      <div id="tab-gallery" hidden>
        <div class="gl-upload">
          <h3>사진 업로드</h3>
          <div class="gl-up-row">
            <label class="gl-file"><input type="file" id="glFiles" accept="image/*" multiple /><span id="glFileLabel">사진 선택 (여러 장 가능)</span></label>
            <input type="text" id="glVenue" placeholder="예식장소 태그 (예: 아펠가모 선릉)" />
            <button class="btn-primary" id="glUploadBtn">업로드</button>
          </div>
          <div class="gl-queue" id="glQueue"></div>
          <p class="gl-status" id="glStatus"></p>
          <p class="gl-hint">※ "사진 선택"이나 드래그로 한 장씩 계속 추가할 수 있어요. 다 모은 뒤 "업로드"를 누르면 한 번에 올라갑니다. 같은 장소면 태그 한 번만 입력하면 돼요. 업로드 시 자동으로 용량을 줄여 빠르게 올립니다.</p>
        </div>
        <div class="gl-tags" id="glTags"></div>
        <div class="gl-grid" id="glGrid"></div>
        <div class="gl-pager" id="glPager"></div>
        <p class="empty" id="glEmpty" hidden>등록된 사진이 없습니다.</p>
      </div>
    </div>
    <footer class="dash-foot">© ONTHEBRIDE · 관리자</footer>
  </section>

  <!-- Detail modal -->
  <div class="modal" id="modal" hidden>
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <div class="modal-card" id="modalCard"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
